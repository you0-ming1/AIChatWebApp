// ============================================================
// Canvas 思维导图绘制引擎
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let scale = 1, offsetX = 0, offsetY = 0;
let selectedNode = null;  // 当前悬停高亮的节点
let allNodes = [];

// 主题色
const COLORS = {
  bg: '#0f1115', line: 'rgba(74,158,255,0.25)',
  boxBg: 'rgba(255,255,255,0.04)', boxBorder: 'rgba(255,255,255,0.08)',
  boxBgHover: 'rgba(74,158,255,0.12)', boxBorderHover: 'rgba(74,158,255,0.3)',
  title: '#4a9eff', text: '#e1e4e8', desc: '#8b949e',
  selected: '#4a9eff', accent: '#ffcb6b',
};
// 布局常量（全局，所有函数都能访问）
const LAYOUT = { H_GAP: 320, V_GAP: 56, NODE_W: 200, NODE_H: 44, DESC_H: 18 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize', resize);

// ---------- 物理引擎: 树布局（防重叠） ----------
function layoutTree(root) {
  const { H_GAP, V_GAP, NODE_W, NODE_H, DESC_H } = LAYOUT;
  let nodeId = 0;

  function calcWidth(node) {
    const ctx = document.createElement('canvas').getContext('2d');
    ctx.font = '14px -apple-system, sans-serif';
    const tw = ctx.measureText(node.label).width;
    const dw = node.desc ? ctx.measureText(node.desc).width : 0;
    return Math.max(NODE_W, Math.min(tw, 280), dw + 20) + 24;
  }

  // 第1遍: 计算每个节点的宽高 + 子树总高度
  function measure(node) {
    node.id = nodeId++;
    node.w = calcWidth(node);
    node.h = NODE_H + (node.desc ? DESC_H + 6 : 0);
    node.collapsed = false;
    node.children = node.children || [];
    // 递归测量子节点
    node.children.forEach(measure);
    // 计算子树总高度
    if (node.children.length > 0 && !node.collapsed) {
      // 子树高度 = 所有子节点自己的高度 + 子节点之间的间距
      node.subtreeH = node.children.reduce((sum, c) => sum + (c.subtreeH || c.h), 0)
        + (node.children.length - 1) * V_GAP;
    } else {
      node.subtreeH = node.h;
    }
  }

  // 第2遍: 从根开始分配位置
  function position(node, x, y) {
    node.x = x;
    node.y = y;
    if (node.children.length > 0 && !node.collapsed) {
      // 计算所有子节点的总高度
      const totalChildrenH = node.children.reduce((sum, c) => sum + (c.subtreeH || c.h), 0)
        + (node.children.length - 1) * V_GAP;
      // 第一个子节点的y = 当前节点y + 节点高度一半 + 间距 - 总高度的一半
      let childY = y + node.h / 2 + V_GAP;
      node.children.forEach(child => {
        // 子节点的子树高度
        const childH = child.subtreeH || child.h;
        // 子节点自身对齐到其子树顶部
        position(child, x + H_GAP, childY);
        childY += childH + V_GAP;
      });
    }
  }

  measure(root);
  position(root, 0, 0);
  // 记录根节点总尺寸
  root.totalW = root.x + root.w + H_GAP * 4;
  root.totalH = root.subtreeH || root.h;

  // 展平节点列表
  allNodes = [];
  collectNodes(root);
  return root;
}

function collectNodes(node) {
  allNodes.push(node);
  if (node.children && !node.collapsed) {
    node.children.forEach(collectNodes);
  }
}

function toggleNode(node) {
  node.collapsed = !node.collapsed;
  allNodes = [];
  collectNodes(DATA);
  draw();
}

// ---------- 绘制 ----------
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(canvas.width / 2 + offsetX, canvas.height / 2 + offsetY);
  ctx.scale(scale, scale);

  // 从根开始递归绘制
  drawNode(ctx, DATA);

  ctx.restore();
}

function drawNode(ctx, node) {
  if (!node) return;
  const x = node.x, y = node.y;
  const w = node.w, h = node.h;

  // 画连线到子节点
  if (node.children && !node.collapsed) {
    node.children.forEach(child => {
      ctx.beginPath();
      ctx.moveTo(x, y + h / 2);
      ctx.lineTo(child.x, child.y + child.h / 2);
      ctx.strokeStyle = COLORS.line;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      drawNode(ctx, child);
    });
  }

  // 判断鼠标悬停
  const isHover = selectedNode === node;

  // 盒子背景
  ctx.beginPath();
  const r = 8;
  ctx.roundRect(x - w / 2, y, w, h, r);
  ctx.fillStyle = isHover ? COLORS.boxBgHover : COLORS.boxBg;
  ctx.fill();
  ctx.strokeStyle = isHover ? COLORS.boxBorderHover : COLORS.boxBorder;
  ctx.lineWidth = 1;
  ctx.stroke();

  // 标题
  ctx.fillStyle = node.children ? COLORS.title : COLORS.text;
  ctx.font = '14px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(node.label, x, y + LAYOUT.NODE_H / 2 - (node.desc ? 6 : 0));

  // 描述
  if (node.desc) {
    ctx.fillStyle = COLORS.desc;
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText(node.desc, x, y + LAYOUT.NODE_H + LAYOUT.DESC_H / 2 - 2);
  }

  // 折叠标记 [+]/[-]
  if (node.children && node.children.length > 0) {
    ctx.fillStyle = COLORS.accent;
    ctx.font = '12px monospace';
    ctx.fillText(node.collapsed ? '[+]' : '[-]', x + w / 2 + 10, y + h / 2);
  }
}

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
  };
}

// ---------- 交互 ----------
let isDragging = false;
let dragStartX, dragStartY, dragOffX, dragOffY;
let mouseDownNode = null;  // mousedown时命中的节点

// 坐标转换：屏幕坐标→画布坐标
function screenToCanvas(cx, cy) {
  return {
    x: (cx - canvas.width / 2 - offsetX) / scale,
    y: (cy - canvas.height / 2 - offsetY) / scale
  };
}

// 检测坐标下的节点
function hitTest(cx, cy) {
  const p = screenToCanvas(cx, cy);
  return allNodes.find(n =>
    p.x >= n.x - n.w / 2 && p.x <= n.x + n.w / 2 &&
    p.y >= n.y && p.y <= n.y + n.h
  ) || null;
}

canvas.addEventListener('mousedown', (e) => {
  isDragging = false;  // 先设为false, mousemove才设为true
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragOffX = offsetX;
  dragOffY = offsetY;
  mouseDownNode = hitTest(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', (e) => {
  // 距离>3px才算拖拽, 防止点击误触
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  if (e.buttons === 1 && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
    isDragging = true;
    offsetX = dragOffX + dx;
    offsetY = dragOffY + dy;
    draw();
  }

  // 悬停检测（只改光标样式，不做其他事）
  const hovered = e.buttons === 0 ? hitTest(e.clientX, e.clientY) : null;
  if (hovered && hovered.children && hovered.children.length > 0) {
    canvas.style.cursor = 'pointer';
  } else {
    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
  }
  // 高亮显示
  if (hovered !== selectedNode) {
    selectedNode = hovered;
    draw();
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (!isDragging && mouseDownNode) {
    // 鼠标没移动过 + 点中了节点 → 视为点击
    if (mouseDownNode.children && mouseDownNode.children.length > 0) {
      toggleNode(mouseDownNode);
    }
  }
  isDragging = false;
  mouseDownNode = null;
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  mouseDownNode = null;
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = scale * delta;
  if (newScale < 0.2 || newScale > 3) return;
  const mx = e.clientX - canvas.width / 2;
  const my = e.clientY - canvas.height / 2;
  offsetX = mx - (mx - offsetX) * delta;
  offsetY = my - (my - offsetY) * delta;
  scale = newScale;
  draw();
});

// ---------- 初始化 ----------
layoutTree(DATA);
resize();

// 初始偏移, 让根节点在左上
offsetX = -DATA.x + 40;
offsetY = -DATA.y + 60;
scale = 0.7;
draw();
</script>
</body>
</html>
